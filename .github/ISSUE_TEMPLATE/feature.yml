name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe what you need and why.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where this feature would help.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Be as specific as you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or alternative approaches.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Topology graph
        - Timeline / Gantt
        - Insights / cost
        - Detail panel
        - Time-travel / replay
        - Session diff
        - CLI / server
        - CI / packaging
        - Documentation
        - Other
    validations:
      required: true
